// Parse test date to get earliest date
function parseTestDate(dateStr){
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const clean = dateStr.replace(" (Online)","");
  // "8-10 May 2026" or "30 Aug 2026"
  const m = clean.match(/(\d+)(?:-\d+)?\s+(\w+)\s+(\d+)/);
  if(!m) return null;
  return new Date(parseInt(m[3]), months[m[2]], parseInt(m[1]));
}

const TEST_DATE_MAP = {};
TESTS.forEach(t => { TEST_DATE_MAP[t.id] = parseTestDate(t.dates); });

function getChapterDeadline(key){
  const testId = CHAPTER_TEST_MAP[key];
  if(!testId) return null;
  const d = TEST_DATE_MAP[testId];
  if(!d) return null;
  // Deadline = 3 days before test
  const dl = new Date(d); dl.setDate(dl.getDate()-3);
  return {date:dl, testId};
}

      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({
        model:GROQ_MODEL, max_tokens:1000, temperature:0.7,
        messages:[{role:"system",content:systemPrompt},{role:"user",content:userPrompt}]
      })
    });
    const raw = await res.text();
    if(!res.ok){let m="HTTP "+res.status;try{m=JSON.parse(raw).error?.message||m;}catch(e){}throw new Error(m);}
    const d = JSON.parse(raw);
    return d.choices?.[0]?.message?.content||"";
  }catch(e){
    if(e.message==="NO_KEY")throw e;
    throw new Error("GROQ_FAIL:"+e.message);
  }
}

async function callAIWithTools(systemPrompt, messages, tools){
  const key = getKey();
  if(!key) throw new Error("NO_KEY");

  // Build tool list as text instructions (more reliable than function calling)
  const toolDesc = tools.map(t=>{
    const props = Object.keys(t.input_schema.properties||{}).join(", ");
    return "- "+t.name+": "+t.description+" | params: {"+props+"}";
  }).join("\n");

  const fullSystem = systemPrompt+"\n\nTOOLS:\n"+toolDesc+"\n\nIF user gives a command, put this at the TOP of reply:\nACTIONS_START\n{\"actions\":[{\"tool\":\"tool_name\",\"params\":{...}}]}\nACTIONS_END\nThen reply normally below. If no action needed, just reply. Match chapter names loosely.";

  const groqMsgs = [{role:"system",content:fullSystem}];
  messages.filter(m=>m.role==="user"||m.role==="assistant").forEach(m=>{
    groqMsgs.push({role:m.role, content:typeof m.content==="string"?m.content:JSON.stringify(m.content)});
  });

  try{
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:GROQ_MODEL, max_tokens:1200, temperature:0.7, messages:groqMsgs})
    });
    const raw = await res.text();
    if(!res.ok){let m="HTTP "+res.status;try{m=JSON.parse(raw).error?.message||m;}catch(e){}throw new Error(m);}
    const d = JSON.parse(raw);
    let fullText = d.choices?.[0]?.message?.content||"";
    const toolCalls = [];
    const actStart = fullText.indexOf("ACTIONS_START");
    const actEnd = fullText.indexOf("ACTIONS_END");
    if(actStart!==-1&&actEnd!==-1){
      try{
        const jsonStr = fullText.slice(actStart+13,actEnd).trim();
        const parsed = JSON.parse(jsonStr);
        (parsed.actions||[]).forEach(a=>{
          toolCalls.push({function:{name:a.tool,arguments:JSON.stringify(a.params||{})}});
        });
      }catch(e){}
      fullText=(fullText.slice(0,actStart)+fullText.slice(actEnd+11)).trim();
    }
    return {text:fullText, toolCalls};
  }catch(e){
    if(e.message==="NO_KEY")throw e;
    throw new Error("GROQ_FAIL:"+e.message);
  }
}

function buildDataContext(data){
  const totalCh = Object.values(CHAPTERS).flat().length;
  const completedKeys = Object.entries(data.chapters||{}).filter(([,v])=>v==="completed"||v==="revised").map(([k])=>k);
  const subjPct = Object.entries(CHAPTERS).map(([s,chs])=>{
    const done=chs.filter(c=>data.chapters[`${s}::${c}`]==="completed"||data.chapters[`${s}::${c}`]==="revised").length;
    return `${s}:${done}/${chs.length}(${Math.round(done/chs.length*100)}%)`;
  }).join(", ");
  const today=new Date();today.setHours(0,0,0,0);
  const backlog=Object.entries(data.chapters||{}).filter(([k,v])=>{
    if(v==="completed"||v==="revised")return false;
    const dl=getChapterDeadline(k);return dl&&dl.date<today;
  }).map(([k])=>k.split("::")[1]).join(", ")||"none";
  const scores=Object.entries(data.testScores||{}).map(([tid,sc])=>`${tid}:${sc.total}/${sc.maxMarks||720}`).join(", ")||"none";
  const subAvg=["physics","chemistry","botany","zoology"].map(sub=>{
    const vals=Object.values(data.testScores||{}).filter(s=>s[sub]!==undefined);
    if(!vals.length)return`${sub}:no data`;
    const avg=Math.round(vals.reduce((a,b)=>a+(b[sub]/(b.maxMarks===240?60:180))*100,0)/vals.length);
    return`${sub}:${avg}%`;
  }).join(", ");
  const revLog=Object.entries(data.revisionLog||{}).map(([k,log])=>{
    const last=log.length?log[log.length-1].date:"never";
    return`${k.split("::")[1]}(rev:${log.length},last:${last.slice(0,10)})`;
  }).join(", ")||"none";
  return {totalCh,completedKeys,subjPct,backlog,scores,subAvg,revLog,streak:data.streak||0,focusHours:Math.round(data.focusHours||0)};
}



// Compute derived stats for AI and badges
function computeStats(data){
  const allKeys = Object.entries(CHAPTERS).flatMap(([s,chs])=>chs.map(c=>`${s}::${c}`));
  const completedChapters = allKeys.filter(k=>data.chapters[k]==="completed"||data.chapters[k]==="revised").length;
  const today = new Date(); today.setHours(0,0,0,0);
  let overdueChapters=0, upcomingDeadlines=[];
  allKeys.forEach(k=>{
    const st = data.chapters[k]||"not-started";
    if(st==="completed"||st==="revised") return;
    const dl = getChapterDeadline(k);
    if(!dl) return;
    const dlDate = new Date(dl.date); dlDate.setHours(0,0,0,0);
    const diff = Math.ceil((dlDate-today)/(86400000));
    if(diff<0) overdueChapters++;
    else if(diff<=14) upcomingDeadlines.push({key:k,diff,testId:dl.testId});
  });
  upcomingDeadlines.sort((a,b)=>a.diff-b.diff);

  const allScores720 = Object.values(data.testScores)
    .filter(s=>s&&s.total!==undefined)
    .map(s=>s.total)
    .filter(s=>s<=720);

  const subjectAvg = {};
  ["physics","chemistry","botany","zoology"].forEach(sub=>{
    const vals=Object.values(data.testScores).filter(s=>s&&s[sub]!==undefined).map(s=>s[sub]);
    subjectAvg[sub] = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : null;
  });

  const todayStr = new Date().toISOString().split("T")[0];
  const pendingTasks = (typeof data.tasks !== 'undefined' ? data.tasks : []).filter(t=>!t.done&&(!t.dueDate||t.dueDate<=todayStr)).length;
  const highPriorityTasks = (typeof data.tasks !== 'undefined' ? data.tasks : []).filter(t=>!t.done&&t.priority==="high").length;
  return {completedChapters, overdueChapters, upcomingDeadlines, allScores720, subjectAvg, pendingTasks, highPriorityTasks};
}

        case "set_chapter_status":{
          // Fuzzy match chapter name
          const chs=CHAPTERS[input.subject]||[];
          const match=chs.find(c=>c.toLowerCase().includes(input.chapter.toLowerCase())||input.chapter.toLowerCase().includes(c.toLowerCase().split(" ").slice(0,2).join(" ")));
          if(!match){logs.push(`\u274C Chapter not found: "${input.chapter}" in ${input.subject}`);break;}
          const key=`${input.subject}::${match}`;
          updateData({chapters:{...(data.chapters||{}),[key]:input.status}});
          logs.push(`\u2705 "${match}" (${input.subject}) -> ${input.status}`);
          break;
        }
        case "add_task":{

          break;

        case "complete_task":{
          const tasks=data.tasks||[];
          const idx=tasks.findIndex(t=>t.text.toLowerCase().includes(input.text.toLowerCase()));

          updateData({tasks:updated});
          logs.push(`\u2705 Completed: "${tasks[idx].text}"`);
          break;
        }
        case "delete_task":{
          const before=data.tasks||[];
